<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor | BlogSpace</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-content">
        <h1 class="nav-logo">
          <a href="/">
            <span class="logo-icon">✍️</span>
            BlogSpace
          </a>
        </h1>
        <div class="nav-actions">
          <a href="/" class="btn btn-secondary">
            <span class="btn-icon">←</span>
            Cancel
          </a>
          <button id="theme-toggle" class="btn btn-icon" title="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <div class="editor-container">
        <header class="editor-header">
          <h2 id="editor-title">Create New Post</h2>
          <p class="editor-subtitle">Share your thoughts with the world</p>
        </header>

        <form id="post-form" class="post-form">
          <!-- Title Input -->
          <div class="form-group">
            <label for="title" class="form-label">Post Title *</label>
            <input 
              type="text" 
              id="title" 
              name="title" 
              class="form-input" 
              placeholder="Enter an engaging title..."
              required
              maxlength="200"
            >
            <small class="form-hint">A catchy title helps readers discover your post</small>
          </div>

          <!-- Category Input -->
          <div class="form-group">
            <label for="category" class="form-label">Category</label>
            <select id="category" name="category" class="form-input">
              <option value="Technology">Technology</option>
              <option value="Lifestyle">Lifestyle</option>
              <option value="Travel">Travel</option>
              <option value="Food">Food</option>
              <option value="Health">Health</option>
              <option value="Education">Education</option>
              <option value="Business">Business</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <!-- Author Input -->
          <div class="form-group">
            <label for="author" class="form-label">Author Name</label>
            <input 
              type="text" 
              id="author" 
              name="author" 
              class="form-input" 
              placeholder="Your name (optional)"
              maxlength="100"
            >
          </div>

          <!-- Content Textarea -->
          <div class="form-group">
            <label for="content" class="form-label">Post Content *</label>
            <textarea 
              id="content" 
              name="content" 
              class="form-textarea" 
              placeholder="Write your story here...&#10;&#10;You can use paragraphs to organize your thoughts.&#10;&#10;Share your unique perspective!"
              required
              rows="15"
            ></textarea>
            <small class="form-hint">Write at least 50 characters</small>
          </div>

          <!-- Character Counter -->
          <div class="char-counter">
            <span id="char-count">0</span> characters
          </div>

          <!-- Form Actions -->
          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn btn-secondary btn-lg">
              Cancel
            </button>
            <button type="submit" id="submit-btn" class="btn btn-primary btn-lg">
              <span class="btn-icon">✓</span>
              <span id="submit-text">Publish Post</span>
            </button>
          </div>

          <!-- Loading State -->
          <div id="form-loading" class="form-loading" style="display: none;">
            <div class="spinner"></div>
            <p>Saving your post...</p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 BlogSpace. Built with 💙 for DAY29 Challenge.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/theme.js"></script>
  <script src="/js/editor.js"></script>
</body>
</html>
