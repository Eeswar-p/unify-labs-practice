<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | BlogSpace</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-content">
        <h1 class="nav-logo">
          <a href="/">
            <span class="logo-icon">✍️</span>
            BlogSpace
          </a>
        </h1>
        <div class="nav-actions">
          <a href="/" class="btn btn-secondary">
            <span class="btn-icon">←</span>
            Back to Home
          </a>
          <button id="theme-toggle" class="btn btn-icon" title="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <!-- Loading State -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading post...</p>
      </div>

      <!-- Error State -->
      <div id="error" class="error-message" style="display: none;">
        <div class="error-content">
          <span class="error-icon">⚠️</span>
          <h3>Post Not Found</h3>
          <p id="error-text">The post you're looking for doesn't exist or has been deleted.</p>
          <a href="/" class="btn btn-primary">Back to Home</a>
        </div>
      </div>

      <!-- Post Content -->
      <article id="post-content" class="post-article" style="display: none;">
        <header class="post-header">
          <div class="post-category" id="post-category"></div>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-meta">
            <span class="post-author" id="post-author"></span>
            <span class="post-date" id="post-date"></span>
          </div>
        </header>

        <div class="post-body" id="post-body"></div>

        <footer class="post-footer">
          <div class="post-actions">
            <button id="edit-btn" class="btn btn-secondary">
              <span class="btn-icon">✏️</span>
              Edit Post
            </button>
            <button id="delete-btn" class="btn btn-danger">
              <span class="btn-icon">🗑️</span>
              Delete Post
            </button>
          </div>
        </footer>
      </article>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 BlogSpace. Built with 💙 for DAY29 Challenge.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/theme.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
