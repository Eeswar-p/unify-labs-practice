<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - E-Commerce Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">🛍️ ShopHub</h1>
      <div class="nav-links">
        <a href="/" class="nav-link">Products</a>
        <a href="/cart.html" class="nav-link cart-link">
          Cart <span class="cart-badge" id="cartBadge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Checkout Section -->
  <section class="checkout-section">
    <div class="container">
      <h2 class="section-title">Checkout</h2>

      <div class="checkout-grid">
        <!-- Customer Form -->
        <div class="checkout-form-container">
          <h3>Customer Information</h3>
          <form id="checkoutForm">
            <div class="form-group">
              <label for="customerName">Full Name *</label>
              <input 
                type="text" 
                id="customerName" 
                name="name" 
                required 
                minlength="3"
                class="form-input"
              >
            </div>

            <div class="form-group">
              <label for="customerEmail">Email *</label>
              <input 
                type="email" 
                id="customerEmail" 
                name="email" 
                required 
                class="form-input"
              >
            </div>

            <div class="form-group">
              <label for="customerPhone">Phone</label>
              <input 
                type="tel" 
                id="customerPhone" 
                name="phone" 
                class="form-input"
              >
            </div>

            <div class="form-group">
              <label for="customerAddress">Shipping Address *</label>
              <textarea 
                id="customerAddress" 
                name="address" 
                required 
                minlength="10"
                rows="3"
                class="form-input"
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
              Place Order
            </button>
          </form>

          <!-- Success Message -->
          <div id="successMessage" class="success-message" style="display: none;">
            <h3>✅ Order Placed Successfully!</h3>
            <p>Thank you for your order. We'll send a confirmation email shortly.</p>
            <p>Order ID: <span id="orderId"></span></p>
            <a href="/" class="btn btn-primary">Continue Shopping</a>
          </div>

          <!-- Error Message -->
          <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
          <h3>Order Summary</h3>
          <div id="orderItems" class="order-items"></div>
          
          <div class="summary-totals">
            <div class="summary-row">
              <span>Subtotal:</span>
              <span id="orderSubtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping:</span>
              <span id="orderShipping">$0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total:</span>
              <span id="orderTotal">$0.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/checkout.js"></script>
</body>
</html>
