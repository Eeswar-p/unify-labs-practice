<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - E-Commerce Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">🛍️ ShopHub</h1>
      <div class="nav-links">
        <a href="/" class="nav-link">Products</a>
        <a href="/cart.html" class="nav-link active cart-link">
          Cart <span class="cart-badge" id="cartBadge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Cart Section -->
  <section class="cart-section">
    <div class="container">
      <h2 class="section-title">Shopping Cart</h2>

      <!-- Empty Cart State -->
      <div id="emptyCart" class="empty-state">
        <h3>Your cart is empty</h3>
        <p>Add some products to get started</p>
        <a href="/" class="btn btn-primary">Browse Products</a>
      </div>

      <!-- Cart Items -->
      <div id="cartContainer" style="display: none;">
        <div class="cart-items" id="cartItems"></div>

        <!-- Cart Summary -->
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping:</span>
            <span id="shipping">$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="total">$0.00</span>
          </div>
          
          <div class="cart-actions">
            <button id="clearCartBtn" class="btn btn-secondary">Clear Cart</button>
            <a href="/checkout.html" class="btn btn-primary">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/cart.js"></script>
</body>
</html>
